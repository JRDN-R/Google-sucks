<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Google Sucks</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    img {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      background: #000;
    }

    @media (orientation: landscape) {
      img {
        object-fit: contain;
      }
    }
  </style>
</head>
<body>
  <img
    src="./IMG_9211.jpeg"
    width="1320"
    height="2242"
    alt=""
    draggable="false"
  />
</body>
</html>
